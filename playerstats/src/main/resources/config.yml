# ====================================================================
#  PlayerStats – Konfiguration
#  Alle Werte sind zur Laufzeit per /playerstats reload neu ladbar.
#  (Ausnahme: ein Wechsel von storage.type erfordert einen Neustart.)
# ====================================================================

# --- Einheiten ------------------------------------------------------
units:
  # ticks | seconds | minutes | hours | days | auto
  time: auto
  # cm | blocks | km | auto   (blocks == Meter)
  distance: blocks
  # raw | hp | hearts          (Rohwert ist 1/10 HP)
  damage: hearts
  auto-detail: 2

# --- Darstellung & Styling -----------------------------------------
# Farben: Minecraft-Namen (gold, dark_red, aqua, ...) ODER Hex (#RRGGBB).
style:
  text-color: "gray"
  number-color: "#55FF55"
  stat-name-color: "gold"
  player-name-color: "#FFAA55"
  title-color: "gold"
  rank-color: "yellow"
  italic: false
  festive: false
  rainbow: false

# --- Anzeige --------------------------------------------------------
display:
  # Klickbaren [Teilen]-Button an Ergebnisse anhaengen.
  show-share-button: true
  # Grosse Zahlen abkuerzen (1.234 -> "1,2K", 5.600.000 -> "5,6M").
  abbreviate-numbers: false
  # Plaetze 1-3 als Medaillen statt #1/#2/#3 (haengt vom Client-Font ab).
  show-medals: true
  # Eintraege pro Seite bei /playerstats <stat> top <seite>.
  top-page-size: 10

# --- Filter & Performance ------------------------------------------
filters:
  use-whitelist: false
  exclude-banned: true
  max-last-join-days: 0
  top-list-size: 10
  # Werte unter diesem Schwellenwert in Top-Listen ausblenden (0 = aus).
  min-value: 0

# --- Leaderboard-Index (Performance & Thread-Safety) ---------------
# top/rank/average lesen aus einem In-Memory-Index statt live ueber alle
# Offline-Spieler zu iterieren. Der Index wird nur auf dem Hauptthread befuellt.
index:
  # Wie oft Online-Spieler im Index aktualisiert werden (Sekunden, min. 30).
  refresh-interval-seconds: 300
  # Offline-Spieler pro Tick beim Aufwaermen nach dem Start (0 = kein Aufwaermen,
  # dann fuellt sich der Index nur ueber Join/Quit).
  warmup-per-tick: 5

# --- Speicherung der CUSTOM-Statistiken ----------------------------
storage:
  # yaml | sqlite | mysql
  type: yaml
  # Wie oft geaenderte Daten gesammelt geschrieben werden (Sekunden).
  flush-interval-seconds: 30
  mysql:
    host: localhost
    port: 3306
    database: playerstats
    user: root
    password: ""
    table-prefix: "ps_"

# --- Event-getrackte CUSTOM-Statistiken ----------------------------
custom:
  track-elytra-time: true
  track-arrow-accuracy: true
  # Nativ nicht unterstuetzt -> Hitbox-Approximation. Standardmaessig aus.
  track-headshots: false
  # Bloecke, die als "selten" zaehlen (/playerstats rare_blocks).
  rare-blocks:
    - ANCIENT_DEBRIS
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE

# --- Update-Pruefung ------------------------------------------------
updater:
  enabled: true
  # OPs beim Beitreten ueber neue Versionen informieren.
  notify-ops: true
  # Neue Version automatisch nach plugins/update/ laden (Paper installiert
  # sie beim naechsten Neustart). Standardmaessig AUS – laedt Code aus dem Netz!
  auto-download: true
  # github | url
  source: github
  # Release-Kanal: stable (nur stabile Releases) | prerelease (auch Beta/Pre-Releases)
  channel: stable
  # Bei source: github  ->  "Besitzer/Repo"
  github-repo: "Schenna43lp1/mc01"

  download-url: ""
  check-interval-hours: 1

# --- Discord-Status-Webhook ----------------------------------------
discord:
  enabled: false
  # ACHTUNG: Webhook-URL ist ein GEHEIMNIS. Niemals in ein oeffentliches
  # Repo committen! Nur lokal eintragen.
  webhook-url: ""
  username: "PlayerStats"
  avatar-url: ""
  # true = huebsche Embeds (farbig), false = einfacher Text.
  use-embeds: true
  # Welche Ereignisse gemeldet werden. Hinweis: Discord-Webhooks sind auf
  # ~30 Anfragen/Minute limitiert – bei vollen Servern join/quit ggf. aus.
  events:
    server-online: true
    server-offline: true
    player-join: true
    player-quit: true
    update-available: true
  # Platzhalter: %player% %online% %version%
  messages:
    server-online: "🟢 Server ist online"
    server-offline: "🔴 Server ist offline"
    player-join: "➕ %player% ist beigetreten (%online% online)"
    player-quit: "➖ %player% hat den Server verlassen"
    update-available: "⬆️ Update verfuegbar: Version %version%"

# --- Material-/Statistik-Gruppen -----------------------------------
# Frei erweiterbar – auch fuer neue Minecraft-Versionen ohne Codeaenderung.
groups:
  # Summiert zu "total_distance".
  distance:
    - WALK_ONE_CM
    - SPRINT_ONE_CM
    - SWIM_ONE_CM
    - FALL_ONE_CM
    - CLIMB_ONE_CM
    - FLY_ONE_CM
    - HORSE_ONE_CM
    - BOAT_ONE_CM
    - AVIATE_ONE_CM
  # Block-Gruppen fuer abgebaute Bloecke (Statistic.MINE_BLOCK).
  blocks:
    diamonds:
      - DIAMOND_ORE
      - DEEPSLATE_DIAMOND_ORE
    ancient_debris:
      - ANCIENT_DEBRIS
    logs:
      - OAK_LOG
      - SPRUCE_LOG
      - BIRCH_LOG
      - JUNGLE_LOG
      - ACACIA_LOG
      - DARK_OAK_LOG
      - MANGROVE_LOG
      - CHERRY_LOG
      - CRIMSON_STEM
      - WARPED_STEM
    ores:
      - COAL_ORE
      - DEEPSLATE_COAL_ORE
      - IRON_ORE
      - DEEPSLATE_IRON_ORE
      - COPPER_ORE
      - DEEPSLATE_COPPER_ORE
      - GOLD_ORE
      - DEEPSLATE_GOLD_ORE
      - REDSTONE_ORE
      - DEEPSLATE_REDSTONE_ORE
      - LAPIS_ORE
      - DEEPSLATE_LAPIS_ORE
      - DIAMOND_ORE
      - DEEPSLATE_DIAMOND_ORE
      - EMERALD_ORE
      - DEEPSLATE_EMERALD_ORE
      - NETHER_GOLD_ORE
      - NETHER_QUARTZ_ORE
  # Crops fuer "plants_harvested" (nur im reifen Zustand gezaehlt).
  crops:
    - WHEAT
    - CARROTS
    - POTATOES
    - BEETROOTS
    - NETHER_WART
